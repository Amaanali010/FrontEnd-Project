<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BARS - Login Page</title>
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
  <div class="auth-container">
    <form class="auth-form signup">
      <h2><i class="fas fa-user-plus"></i> Welcome Back</h2>

      <div class="form-group">
        <input type="text" placeholder="Email or Username" required />
        <i class="fas fa-user"></i>
      </div>

      <div class="form-group">
        <input type="password" placeholder="Password" required />
        <i class="fas fa-lock"></i>
      </div>
      <button type="submit"><i class="fas fa-paper-plane"></i> Sign in</button>
      <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
    </form>
  </div>
  <!-- Back to Home Link -->
        <div style="position:absolute;  top: 5%;    left: 3%;">
            <a href="index.html" style="color:#fff; margin-top: 0; text-decoration: none; font-weight: bold;">
                <i class="fas fa-arrow-left"></i> Back to Home Page
            </a>
        </div>
</body>

</html>

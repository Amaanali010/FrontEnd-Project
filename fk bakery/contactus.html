<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title> FK bakery - Contact Us</title>
    <link rel="stylesheet" href="style.css">
<img src="image/unnamed-removebg-preview.png" alt="" height="250 px" width=" 180px">
  </head>
<body>
    <!-- Header -->
    <header>
        
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="menu.html">Menu</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <!-- Main Section -->
    <main>
        <h2>Contact & Order</h2>
        <p>Fill the form below to place your order.</p>

        <form>
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" placeholder="Enter your name" required>

            <label for="food">Food Item</label>
            <input type="text" id="food" name="food" placeholder="e.g. Chocolate Cake" required>

            <label for="address">Delivery Address</label>
            <textarea id="address" name="address" placeholder="Enter your address" required></textarea>

            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" name="phone" placeholder="03XX-XXXXXXX" required>

            <label for="payment">Payment Method</label>
            <select id="payment" name="payment">
                <option>Cash on Delivery</option>
                <option>Online Payment</option>
            </select>

            <input type="submit" value="Place Order">
        </form>
    </main>

    <!-- Footer -->
    <footer>
        <p>Email: info@fkbakery.com | Phone: +92-300-1234567</p>
        <p>&copy; 2025 FK Bakery | Fresh Taste Every Day</p>
    </footer>
</body>
</html>

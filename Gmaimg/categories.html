<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Categories — NEXUS GAMES</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="nexus-nav navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand nav-logo" href="index.html">NEXUS<span>.</span>GG</a>
    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu" style="color:var(--blue)">
      <i class="bi bi-list" style="font-size:1.6rem"></i>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto align-items-center gap-1">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="categories.html">Categories</a></li>
        <li class="nav-item">
          <a class="nav-link" href="cart.html"><i class="bi bi-cart3"></i> Cart
            <span class="cart-badge cart-count">0</span></a>
        </li>
        <li class="nav-item ms-2">
          <a href="checkout.html" class="btn-neon" style="font-size:0.7rem;padding:0.5rem 1.2rem;">
            <i class="bi bi-lightning-fill"></i> Checkout
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<!-- PAGE HERO -->
<div class="page-hero">
  <div class="container">
    <div class="breadcrumb-neon">
      <a href="index.html" style="color:var(--text-muted);">Home</a>
      <span> / Categories</span>
    </div>
    <h1 class="page-hero-title">GAME <span style="color:var(--blue)">CATALOG</span></h1>
    <p style="color:var(--text-muted);max-width:500px;margin-top:0.5rem;">Browse our full library — from blockbuster RPGs to pro-grade accessories.</p>
  </div>
</div>

<div class="page-wrapper">
  <div class="container pb-5">

    <!-- Search + Sort bar -->
    <div class="d-flex flex-wrap gap-3 align-items-center mb-4">
      <div style="flex:1;min-width:220px;position:relative;">
        <i class="bi bi-search" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-muted);"></i>
        <input type="text" id="searchInput" placeholder="Search games..." style="width:100%;background:var(--card-bg);border:1.5px solid var(--border);color:var(--text);border-radius:8px;padding:0.65rem 1rem 0.65rem 2.5rem;font-family:var(--font-body);outline:none;transition:border-color 0.2s;" onfocus="this.style.borderColor='var(--blue)'" onblur="this.style.borderColor='var(--border)'">
      </div>
      <select id="sortSelect" style="background:var(--card-bg);border:1.5px solid var(--border);color:var(--text);border-radius:8px;padding:0.65rem 1rem;font-family:var(--font-body);outline:none;cursor:pointer;">
        <option value="default">Sort: Default</option>
        <option value="price-asc">Price: Low → High</option>
        <option value="price-desc">Price: High → Low</option>
        <option value="rating">Top Rated</option>
      </select>
    </div>

    <!-- PC GAMES -->
    <div class="mb-5" id="pc-section">
      <div class="cat-section-header">
        <div class="cat-icon blue"><i class="bi bi-pc-display-horizontal"></i></div>
        <div>
          <div class="section-label" style="margin-bottom:0">PC Games</div>
          <h2 class="section-title" style="font-size:1.5rem;">DESKTOP <span class="accent">ARSENAL</span></h2>
        </div>
      </div>
      <div class="filter-bar">
        <button class="filter-btn active" data-cat="pc" data-filter="all">All</button>
        <button class="filter-btn" data-cat="pc" data-filter="Action RPG">Action RPG</button>
        <button class="filter-btn" data-cat="pc" data-filter="FPS">FPS</button>
        <button class="filter-btn" data-cat="pc" data-filter="Strategy">Strategy</button>
        <button class="filter-btn" data-cat="pc" data-filter="Racing">Racing</button>
      </div>
      <div class="row g-4" id="pc-grid"></div>
    </div>

    <!-- CONSOLE GAMES -->
    <div class="mb-5" id="console-section">
      <div class="cat-section-header">
        <div class="cat-icon purple"><i class="bi bi-controller"></i></div>
        <div>
          <div class="section-label" style="margin-bottom:0">Console Games</div>
          <h2 class="section-title" style="font-size:1.5rem;">CONSOLE <span class="accent-purple">EXCLUSIVES</span></h2>
        </div>
      </div>
      <div class="filter-bar">
        <button class="filter-btn active" data-cat="console" data-filter="all">All</button>
        <button class="filter-btn" data-cat="console" data-filter="PS5">PlayStation 5</button>
        <button class="filter-btn" data-cat="console" data-filter="Xbox">Xbox</button>
      </div>
      <div class="row g-4" id="console-grid"></div>
    </div>

    <!-- ACCESSORIES -->
    <div class="mb-5" id="acc-section">
      <div class="cat-section-header">
        <div class="cat-icon pink"><i class="bi bi-headset"></i></div>
        <div>
          <div class="section-label" style="margin-bottom:0">Accessories</div>
          <h2 class="section-title" style="font-size:1.5rem;">PRO <span style="color:var(--pink)">GEAR</span></h2>
        </div>
      </div>
      <div class="row g-4" id="acc-grid"></div>
    </div>

  </div>
</div>

<!-- FOOTER (minimal) -->
<footer style="padding:1.5rem 0;">
  <div class="container d-flex justify-content-between align-items-center flex-wrap gap-2">
    <a href="index.html" class="footer-logo" style="font-size:1.1rem;">NEXUS.GG</a>
    <div class="footer-copy">© 2024 NEXUS.GG</div>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="cart.js"></script>
<script>
  function renderPCGrid(filter = 'all') {
    const el = document.getElementById('pc-grid');
    let games = PRODUCTS.filter(p => p.platform.includes('PC'));
    if (filter !== 'all') games = games.filter(p => p.genre.toLowerCase().includes(filter.toLowerCase()));
    el.innerHTML = games.length
      ? games.map(p => `<div class="col-6 col-md-4 col-lg-3">${buildGameCard(p)}</div>`).join('')
      : `<div class="col-12 text-center py-4" style="color:var(--text-muted)">No games found.</div>`;
  }

  function renderConsoleGrid(filter = 'all') {
    const el = document.getElementById('console-grid');
    let games = PRODUCTS.filter(p => p.platform.includes('PS5') || p.platform.includes('Xbox'));
    if (filter === 'PS5')  games = PRODUCTS.filter(p => p.platform.includes('PS5'));
    if (filter === 'Xbox') games = PRODUCTS.filter(p => p.platform.includes('Xbox'));
    el.innerHTML = games.map(p => `<div class="col-6 col-md-4 col-lg-3">${buildGameCard(p)}</div>`).join('');
  }

  function renderAccGrid() {
    const el = document.getElementById('acc-grid');
    const accs = PRODUCTS.filter(p => p.genre === 'Accessory');
    el.innerHTML = accs.map(p => `<div class="col-6 col-md-4">${buildGameCard(p)}</div>`).join('');
  }

  renderPCGrid(); renderConsoleGrid(); renderAccGrid();

  // Category filters
  document.querySelectorAll('.filter-btn[data-cat]').forEach(btn => {
    btn.addEventListener('click', () => {
      const cat = btn.dataset.cat;
      document.querySelectorAll(`.filter-btn[data-cat="${cat}"]`).forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (cat === 'pc') renderPCGrid(btn.dataset.filter);
      if (cat === 'console') renderConsoleGrid(btn.dataset.filter);
    });
  });

  // Search
  document.getElementById('searchInput').addEventListener('input', function() {
    const q = this.value.toLowerCase();
    const pcEl = document.getElementById('pc-grid');
    const consoleEl = document.getElementById('console-grid');
    const accEl = document.getElementById('acc-grid');
    if (!q) { renderPCGrid(); renderConsoleGrid(); renderAccGrid(); return; }
    const match = PRODUCTS.filter(p => p.title.toLowerCase().includes(q) || p.genre.toLowerCase().includes(q));
    const render = (el, arr) => {
      el.innerHTML = arr.length
        ? arr.map(p => `<div class="col-6 col-md-4 col-lg-3">${buildGameCard(p)}</div>`).join('')
        : '';
    };
    render(pcEl, match.filter(p => p.platform.includes('PC')));
    render(consoleEl, match.filter(p => p.platform.includes('PS5') || p.platform.includes('Xbox')));
    render(accEl, match.filter(p => p.genre === 'Accessory'));
  });

  // Sort
  document.getElementById('sortSelect').addEventListener('change', function() {
    let sorted = [...PRODUCTS];
    if (this.value === 'price-asc')  sorted.sort((a,b) => a.price - b.price);
    if (this.value === 'price-desc') sorted.sort((a,b) => b.price - a.price);
    if (this.value === 'rating')     sorted.sort((a,b) => b.rating - a.rating);
    const pcEl = document.getElementById('pc-grid');
    const cEl  = document.getElementById('console-grid');
    const aEl  = document.getElementById('acc-grid');
    pcEl.innerHTML = sorted.filter(p => p.platform.includes('PC')).map(p=>`<div class="col-6 col-md-4 col-lg-3">${buildGameCard(p)}</div>`).join('');
    cEl.innerHTML  = sorted.filter(p => p.platform.includes('PS5')||p.platform.includes('Xbox')).map(p=>`<div class="col-6 col-md-4 col-lg-3">${buildGameCard(p)}</div>`).join('');
    aEl.innerHTML  = sorted.filter(p => p.genre==='Accessory').map(p=>`<div class="col-6 col-md-4">${buildGameCard(p)}</div>`).join('');
  });
</script>
</body>
</html>
